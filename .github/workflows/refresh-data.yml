name: Refresh Data from Databricks

on:
  schedule:
    # Every Monday at 6:00 AM UTC (7:00 AM CET Malta time)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install databricks-sql-connector pandas

      - name: Refresh calculator & AM dashboard
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python3 scripts/refresh_data.py

      - name: Refresh investment dashboard (all countries)
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python3 scripts/refresh_investment_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add campaign-cost-calculator.html am-spend-dashboard.html investment-data/
          if git diff --cached --quiet; then
            echo "No data changes detected."
          else
            git commit -m "Auto-refresh data from Databricks ($(date +%Y-%m-%d))"
            git push
          fi
