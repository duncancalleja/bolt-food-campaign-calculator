<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Portfolio Overview — Bolt Food Malta</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242735;
    --border: #2e3144;
    --text: #e4e6f0;
    --text-dim: #8b8fa3;
    --accent: #34d399;
    --accent-dim: rgba(52,211,153,.12);
    --bolt: #6366f1;
    --bolt-dim: rgba(99,102,241,.12);
    --provider: #f59e0b;
    --provider-dim: rgba(245,158,11,.12);
    --danger: #ef4444;
    --danger-dim: rgba(239,68,68,.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .header {
    padding: 18px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .badge {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    background: var(--accent-dim); color: var(--accent);
    font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
  }
  .header .nav-link {
    margin-left: auto; font-size: 13px; color: var(--accent);
    text-decoration: none; display: flex; align-items: center; gap: 4px;
  }
  .header .nav-link:hover { text-decoration: underline; }

  .summary-cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; padding: 24px 32px;
  }
  .s-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px;
  }
  .s-card .s-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .s-card .s-value { font-size: 26px; font-weight: 700; }
  .s-card .s-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .s-card.accent .s-value { color: var(--accent); }
  .s-card.bolt .s-value { color: var(--bolt); }
  .s-card.prov .s-value { color: var(--provider); }
  .s-card.danger .s-value { color: var(--danger); }

  .portfolio-section { padding: 0 32px 32px; }
  .portfolio-section .section-title {
    font-size: 16px; font-weight: 600; margin: 0 0 16px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .count {
    font-size: 11px; background: var(--surface2); color: var(--text-dim);
    padding: 2px 8px; border-radius: 10px;
  }
  .portfolio-table-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; margin-bottom: 8px;
  }
  .portfolio-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .portfolio-table thead th {
    background: var(--surface2); padding: 10px 12px; text-align: left;
    font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-dim); font-weight: 600; position: sticky; top: 0;
    white-space: nowrap;
  }
  .portfolio-table thead th.right { text-align: right; }
  .portfolio-table tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .portfolio-table tbody td.right { text-align: right; font-variant-numeric: tabular-nums; }
  .portfolio-table tbody tr:hover { background: rgba(52,211,153,.04); }
  .portfolio-table tbody tr:last-child td { border-bottom: none; }
  .portfolio-table tfoot td {
    padding: 10px 12px; font-weight: 700; border-top: 2px solid var(--border);
    background: var(--surface2); font-size: 13px;
  }
  .portfolio-table tfoot td.right { text-align: right; font-variant-numeric: tabular-nums; }

  .seg-badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 11px; font-weight: 600; margin: 0 1px;
  }
  .seg-smb { background: rgba(99,102,241,.12); color: #818cf8; }
  .seg-mm { background: rgba(245,158,11,.12); color: #fbbf24; }
  .seg-ent { background: rgba(52,211,153,.12); color: #34d399; }

  .mismatch-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;
    background: rgba(239,68,68,.12); color: #ef4444; cursor: pointer;
  }
  .mismatch-badge:hover { background: rgba(239,68,68,.2); }
  .mismatch-rows { display: none; }
  .mismatch-rows.open { display: table-row-group; }
  .mismatch-pill {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 600;
  }
  .mismatch-pill.wrong { background: rgba(239,68,68,.15); color: #f87171; }
  .mismatch-pill.expected { background: rgba(52,211,153,.12); color: var(--accent); }

  .gmv-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .gmv-bar-track {
    flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden;
    min-width: 60px;
  }
  .gmv-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width .4s ease; }

  .upload-bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .upload-bar button {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .upload-bar button:hover { border-color: var(--accent); color: var(--accent); }
  .upload-bar button.clear { color: var(--text-dim); }

  @media (max-width: 768px) {
    .header, .summary-cards, .portfolio-section { padding-left: 16px; padding-right: 16px; }
    .summary-cards { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

function fmt(n) { return '\u20ac' + Math.round(n).toLocaleString(); }

const AM_SEGMENT_RULES = {
  'Alena Tokareva':  { allowed: ['Enterprise'], label: 'ENT only' },
  'Mariem Slimen':   { allowed: ['Mid-market'], label: 'MM only' },
  'Yousef Moungad':  { allowed: ['Mid-market'], label: 'MM only' },
  'Gulcin Erguven':  { allowed: ['Mid-market'], label: 'MM only' },
  'Fiona Borg':      { allowed: null, label: 'Stores' },
};

function getProviderSeg(segRaw) {
  if (!segRaw) return 'SMB';
  if (segRaw.includes('Enterprise')) return 'Enterprise';
  if (segRaw.includes('Mid-market') || segRaw.includes('Mid market')) return 'Mid-market';
  return 'SMB';
}

function getProviderName(pid) {
  if (typeof _BRAND_GROUP !== 'undefined' && _BRAND_GROUP[pid]) return _BRAND_GROUP[pid][0];
  return 'PID ' + pid;
}

function toggleMismatchRows(amId) {
  const el = document.getElementById('mm_' + amId);
  if (el) el.classList.toggle('open');
}

// CSV upload support
const BG_KEY = 'am_portfolio_brand_group';
let _brandGroupMap = {};

function getBrandGroupData() {
  try { return JSON.parse(localStorage.getItem(BG_KEY) || '{}'); } catch { return {}; }
}
function saveBrandGroupData(data) {
  localStorage.setItem(BG_KEY, JSON.stringify(data));
  _brandGroupMap = data;
}
function loadBrandGroupData() {
  _brandGroupMap = getBrandGroupData();
  updateBGStatus();
}
function clearBrandGroupData() {
  localStorage.removeItem(BG_KEY);
  _brandGroupMap = {};
  updateBGStatus();
  renderPortfolio();
}
function updateBGStatus() {
  const count = Object.keys(_brandGroupMap).length;
  const el = document.getElementById('brandGroupStatus');
  const btn = document.getElementById('btnClearBG');
  if (count > 0) {
    el.textContent = count + ' providers mapped (uploaded)';
    el.style.color = 'var(--accent)';
    btn.style.display = '';
  } else {
    el.textContent = '';
    btn.style.display = 'none';
  }
}

function parseCSV(text) {
  const rows = [];
  let current = '';
  let inQuotes = false;
  const lines = text.split('\n');
  for (const line of lines) {
    if (inQuotes) {
      current += '\n' + line;
      if ((line.match(/"/g) || []).length % 2 === 1) { inQuotes = false; rows.push(current); current = ''; }
    } else {
      if ((line.match(/"/g) || []).length % 2 === 1) { inQuotes = true; current = line; }
      else { rows.push(line); }
    }
  }
  if (current) rows.push(current);
  return rows.map(row => {
    const fields = []; let field = ''; let q = false;
    for (let i = 0; i < row.length; i++) {
      const ch = row[i];
      if (q) { if (ch === '"' && row[i+1] === '"') { field += '"'; i++; } else if (ch === '"') { q = false; } else { field += ch; } }
      else { if (ch === '"') { q = true; } else if (ch === ',') { fields.push(field.trim()); field = ''; } else { field += ch; } }
    }
    fields.push(field.trim());
    return fields;
  });
}

function findCol(headers, ...candidates) {
  for (const cand of candidates) {
    const idx = headers.findIndex(h => h.toLowerCase().replace(/[^a-z0-9]/g, '') === cand.replace(/[^a-z0-9]/g, ''));
    if (idx >= 0) return idx;
  }
  return -1;
}

function parseCurrencyNum(s) {
  if (!s) return 0;
  const n = parseFloat(s.replace(/[^0-9.\-]/g, ''));
  return isNaN(n) ? 0 : n;
}

function handleBrandGroupUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const rows = parseCSV(text);
    if (rows.length < 2) { alert('CSV has no data rows.'); input.value = ''; return; }
    const headers = rows[0].map(h => h.trim());

    const pidCol = findCol(headers, 'providerid', 'pid', 'provider_id', 'id', 'entityid', 'entity_id');
    const brandCol = findCol(headers, 'brand', 'brandname', 'brand_name');
    const groupCol = findCol(headers, 'group', 'groupname', 'group_name', 'restaurant_group', 'restaurantgroup');
    const amCol = findCol(headers, 'accountmanagername', 'account_manager_name', 'accountmanager', 'am');
    const segCol = findCol(headers, 'businesssegmentv2', 'business_segment_v2', 'segment', 'businesssegment');
    const gmvCol = headers.findIndex(h => /total\s*gmv\s*before\s*discount/i.test(h));
    const courierOrdersCol = headers.findIndex(h => /courier\s*delivered\s*orders\s*count/i.test(h));
    const merchantOrdersCol = headers.findIndex(h => /merchant\s*delivered\s*orders\s*count/i.test(h));
    const nameCol = findCol(headers, 'providername', 'provider_name', 'name');

    if (pidCol < 0) {
      alert('Could not find Provider ID column.\nHeaders found: ' + headers.slice(0, 20).join(', '));
      input.value = ''; return;
    }

    const isMerchantOverview = amCol >= 0 && segCol >= 0;
    const bgData = {};
    let imported = 0;

    if (isMerchantOverview) {
      const newProviderLookup = {};
      const newBrandGroup = {};
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        const pid = (r[pidCol] || '').trim().replace(/[^0-9]/g, '');
        if (!pid) continue;

        const am = (r[amCol] || '').trim();
        const seg = (r[segCol] || '').trim();
        if (!am) continue;

        const gmv = gmvCol >= 0 ? parseCurrencyNum(r[gmvCol]) : 0;
        const courierOrders = courierOrdersCol >= 0 ? parseCurrencyNum(r[courierOrdersCol]) : 0;
        const merchantOrders = merchantOrdersCol >= 0 ? parseCurrencyNum(r[merchantOrdersCol]) : 0;
        const totalOrders = courierOrders + merchantOrders;
        const aov = totalOrders > 0 ? gmv / totalOrders : 0;

        if (newProviderLookup[pid]) {
          newProviderLookup[pid][1] += totalOrders;
          newProviderLookup[pid][2] += gmv;
          newProviderLookup[pid][3] = newProviderLookup[pid][2] / (newProviderLookup[pid][1] || 1);
        } else {
          newProviderLookup[pid] = [am, totalOrders, gmv, Math.round(aov * 100) / 100, seg];
        }

        const brand = brandCol >= 0 ? (r[brandCol] || '').trim() : '';
        const group = groupCol >= 0 ? (r[groupCol] || '').trim() : '';
        if (brand || group) {
          newBrandGroup[pid] = [brand, group];
        }
        imported++;
      }

      Object.keys(_PROVIDER_LOOKUP).forEach(k => delete _PROVIDER_LOOKUP[k]);
      Object.assign(_PROVIDER_LOOKUP, newProviderLookup);

      if (typeof _BRAND_GROUP !== 'undefined') {
        Object.keys(_BRAND_GROUP).forEach(k => delete _BRAND_GROUP[k]);
        Object.assign(_BRAND_GROUP, newBrandGroup);
      }

      _brandGroupMap = {};
      localStorage.removeItem(BG_KEY);

      updateBGStatus();
      renderPortfolio();
      alert('Full refresh: ' + imported + ' providers loaded.\nProvider data, brands, groups, segments all updated.');
    } else {
      if (brandCol < 0 && groupCol < 0) {
        alert('Could not find Brand or Group columns.\nHeaders: ' + headers.slice(0, 20).join(', '));
        input.value = ''; return;
      }
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        const pid = (r[pidCol] || '').trim().replace(/[^0-9]/g, '');
        if (!pid) continue;
        const brand = brandCol >= 0 ? (r[brandCol] || '').trim() : '';
        const group = groupCol >= 0 ? (r[groupCol] || '').trim() : '';
        if (!brand && !group) continue;
        bgData[pid] = {};
        if (brand) bgData[pid].brand = brand;
        if (group) bgData[pid].group = group;
        imported++;
      }
      saveBrandGroupData(bgData);
      updateBGStatus();
      renderPortfolio();
      alert('Imported ' + imported + ' brand/group mappings (replaces previous upload).');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function renderPortfolio() {
  const amPortfolio = {};
  const brandsByAM = {};
  const groupsByAM = {};
  const mismatchesByAM = {};
  const hasEmbeddedBG = typeof _BRAND_GROUP !== 'undefined' && Object.keys(_BRAND_GROUP).length > 0;
  const hasUploadedBG = Object.keys(_brandGroupMap).length > 0;

  for (const [pid, pdata] of Object.entries(_PROVIDER_LOOKUP)) {
    const am = pdata[0];
    const orders = pdata[1];
    const gmv = pdata[2];
    const segRaw = pdata[4] || '';
    const seg = getProviderSeg(segRaw);

    if (!amPortfolio[am]) {
      amPortfolio[am] = { accounts: 0, smb: 0, mm: 0, ent: 0, gmv: 0, orders: 0 };
      brandsByAM[am] = new Set();
      groupsByAM[am] = new Set();
      mismatchesByAM[am] = [];
    }
    amPortfolio[am].accounts++;
    amPortfolio[am].gmv += gmv;
    amPortfolio[am].orders += orders;

    if (seg === 'Enterprise') amPortfolio[am].ent++;
    else if (seg === 'Mid-market') amPortfolio[am].mm++;
    else amPortfolio[am].smb++;

    const rule = AM_SEGMENT_RULES[am];
    if (rule && rule.allowed && !rule.allowed.includes(seg)) {
      mismatchesByAM[am].push({ pid, seg, orders, gmv });
    }

    if (hasUploadedBG && _brandGroupMap[pid]) {
      if (_brandGroupMap[pid].brand) brandsByAM[am].add(_brandGroupMap[pid].brand.toLowerCase().trim());
      if (_brandGroupMap[pid].group) groupsByAM[am].add(_brandGroupMap[pid].group.toLowerCase().trim());
    } else if (hasEmbeddedBG && _BRAND_GROUP[pid]) {
      if (_BRAND_GROUP[pid][0]) brandsByAM[am].add(_BRAND_GROUP[pid][0].toLowerCase().trim());
      if (_BRAND_GROUP[pid][1]) groupsByAM[am].add(_BRAND_GROUP[pid][1].toLowerCase().trim());
    }
  }

  const maxGMV = Math.max(...Object.values(amPortfolio).map(d => d.gmv), 1);
  const amArr = Object.entries(amPortfolio).sort((a, b) => b[1].gmv - a[1].gmv);

  let totalAccounts = 0, totalSMB = 0, totalMM = 0, totalENT = 0, totalGMV = 0, totalOrders = 0, totalMismatched = 0;
  const allBrands = new Set();
  const allGroups = new Set();

  let html = '';
  amArr.forEach(([am, d]) => {
    const avgAov = d.orders > 0 ? d.gmv / d.orders : 0;
    const brands = brandsByAM[am] ? brandsByAM[am].size : 0;
    const groups = groupsByAM[am] ? groupsByAM[am].size : 0;
    const pctBar = maxGMV > 0 ? (d.gmv / maxGMV * 100) : 0;
    const mismatches = mismatchesByAM[am] || [];
    const rule = AM_SEGMENT_RULES[am];
    const amId = am.replace(/[^a-zA-Z0-9]/g, '_');

    totalAccounts += d.accounts;
    totalSMB += d.smb;
    totalMM += d.mm;
    totalENT += d.ent;
    totalGMV += d.gmv;
    totalOrders += d.orders;
    totalMismatched += mismatches.length;
    if (brandsByAM[am]) brandsByAM[am].forEach(b => allBrands.add(b));
    if (groupsByAM[am]) groupsByAM[am].forEach(g => allGroups.add(g));

    const brandCell = brands > 0 ? brands : '<span style="color:var(--text-dim)">\u2014</span>';
    const hasBG = hasEmbeddedBG || hasUploadedBG;
    const groupCell = groups > 0 ? groups : '<span style="color:var(--text-dim)">\u2014</span>';

    let mismatchCell;
    if (mismatches.length > 0) {
      mismatchCell = '<span class="mismatch-badge" onclick="toggleMismatchRows(\'' + amId + '\')" title="Expected: ' + rule.label + '. Click to expand.">' + mismatches.length + '</span>';
    } else if (rule && rule.allowed) {
      mismatchCell = '<span style="color:var(--accent);font-size:11px;font-weight:600" title="All accounts match ' + rule.label + '">OK</span>';
    } else if (rule && !rule.allowed) {
      mismatchCell = '<span style="color:var(--text-dim);font-size:11px">' + rule.label + '</span>';
    } else {
      mismatchCell = '<span style="color:var(--text-dim)">\u2014</span>';
    }

    const smb_hl = (rule && rule.allowed && !rule.allowed.includes('SMB') && d.smb > 0);
    const mm_hl = (rule && rule.allowed && !rule.allowed.includes('Mid-market') && d.mm > 0);
    const ent_hl = (rule && rule.allowed && !rule.allowed.includes('Enterprise') && d.ent > 0);

    const smbCell = d.smb > 0
      ? '<span class="seg-badge seg-smb" style="' + (smb_hl ? 'background:rgba(239,68,68,.15);color:#f87171' : '') + '">' + d.smb + '</span>'
      : '<span style="color:var(--text-dim)">0</span>';
    const mmCell = d.mm > 0
      ? '<span class="seg-badge seg-mm" style="' + (mm_hl ? 'background:rgba(239,68,68,.15);color:#f87171' : '') + '">' + d.mm + '</span>'
      : '<span style="color:var(--text-dim)">0</span>';
    const entCell = d.ent > 0
      ? '<span class="seg-badge seg-ent" style="' + (ent_hl ? 'background:rgba(239,68,68,.15);color:#f87171' : '') + '">' + d.ent + '</span>'
      : '<span style="color:var(--text-dim)">0</span>';

    const rowStyle = mismatches.length > 0 ? ' style="border-left:3px solid #ef4444"' : '';

    html += '<tr' + rowStyle + '>';
    html += '<td style="font-weight:600">' + am + (rule ? '<span style="font-size:10px;color:var(--text-dim);font-weight:400;margin-left:6px">' + rule.label + '</span>' : '') + '</td>';
    html += '<td class="right">' + d.accounts + '</td>';
    html += '<td class="right">' + brandCell + '</td>';
    html += '<td class="right">' + groupCell + '</td>';
    html += '<td class="right">' + smbCell + '</td>';
    html += '<td class="right">' + mmCell + '</td>';
    html += '<td class="right">' + entCell + '</td>';
    html += '<td class="right">' + mismatchCell + '</td>';
    html += '<td class="right" style="font-weight:600">' + fmt(d.gmv) + '</td>';
    html += '<td class="right">' + d.orders.toLocaleString() + '</td>';
    html += '<td class="right">' + fmt(avgAov) + '</td>';
    html += '<td><div class="gmv-bar-wrap"><div class="gmv-bar-track"><div class="gmv-bar-fill" style="width:' + pctBar + '%"></div></div></div></td>';
    html += '</tr>';

    if (mismatches.length > 0) {
      html += '<tr id="mm_' + amId + '" class="mismatch-rows"><td colspan="12" style="padding:0">';
      html += '<table style="width:100%;border-collapse:collapse;font-size:12px;background:rgba(239,68,68,.03)">';
      html += '<tr style="border-bottom:1px solid var(--border)"><th style="padding:6px 12px 6px 24px;text-align:left;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px">Provider</th><th style="padding:6px 12px;text-align:left;font-size:10px;color:var(--text-dim);text-transform:uppercase">PID</th><th style="padding:6px 12px;font-size:10px;color:var(--text-dim);text-transform:uppercase">Current Segment</th><th style="padding:6px 12px;font-size:10px;color:var(--text-dim);text-transform:uppercase">Expected</th><th style="padding:6px 12px;text-align:right;font-size:10px;color:var(--text-dim);text-transform:uppercase">8wk GMV</th><th style="padding:6px 12px;text-align:right;font-size:10px;color:var(--text-dim);text-transform:uppercase">8wk Orders</th></tr>';
      mismatches.sort((a, b) => b.gmv - a.gmv).forEach(m => {
        const name = getProviderName(m.pid);
        html += '<tr style="border-bottom:1px solid var(--border)">';
        html += '<td style="padding:5px 12px 5px 24px;font-weight:500">' + name + '</td>';
        html += '<td style="padding:5px 12px;color:var(--text-dim)">' + m.pid + '</td>';
        html += '<td style="padding:5px 12px"><span class="mismatch-pill wrong">' + m.seg + '</span></td>';
        html += '<td style="padding:5px 12px"><span class="mismatch-pill expected">' + rule.allowed.join(' / ') + '</span></td>';
        html += '<td style="padding:5px 12px;text-align:right">' + fmt(m.gmv) + '</td>';
        html += '<td style="padding:5px 12px;text-align:right">' + m.orders.toLocaleString() + '</td>';
        html += '</tr>';
      });
      html += '</table></td></tr>';
    }
  });

  document.getElementById('portfolioBody').innerHTML = html;
  document.getElementById('portfolioCount').textContent = totalMismatched > 0
    ? amArr.length + ' AMs \u00b7 ' + totalAccounts + ' accounts \u00b7 ' + totalMismatched + ' mismatched'
    : amArr.length + ' AMs \u00b7 ' + totalAccounts + ' accounts';

  const totalAvgAov = totalOrders > 0 ? totalGMV / totalOrders : 0;
  let foot = '<tr><td>Total</td>';
  foot += '<td class="right">' + totalAccounts + '</td>';
  foot += '<td class="right">' + (allBrands.size > 0 ? allBrands.size : '\u2014') + '</td>';
  foot += '<td class="right">' + (allGroups.size > 0 ? allGroups.size : '\u2014') + '</td>';

  foot += '<td class="right">' + totalOrders.toLocaleString() + '</td>';
  foot += '<td class="right">' + fmt(totalAvgAov) + '</td>';
  foot += '<td></td></tr>';
  document.getElementById('portfolioFoot').innerHTML = foot;

  // Summary cards
  let cards = '';
  cards += '<div class="s-card accent"><div class="s-label">Total Accounts</div><div class="s-value">' + totalAccounts + '</div><div class="s-sub">' + allBrands.size + ' brands \u00b7 ' + allGroups.size + ' groups</div></div>';
  cards += '<div class="s-card bolt"><div class="s-label">Enterprise</div><div class="s-value">' + totalENT + '</div><div class="s-sub">' + fmt(amArr.filter(([am]) => AM_SEGMENT_RULES[am] && AM_SEGMENT_RULES[am].label === 'ENT only').reduce((s,[,d]) => s + d.gmv, 0)) + ' GMV</div></div>';
  cards += '<div class="s-card prov"><div class="s-label">Mid-Market</div><div class="s-value">' + totalMM + '</div><div class="s-sub">' + fmt(amArr.filter(([am]) => AM_SEGMENT_RULES[am] && AM_SEGMENT_RULES[am].label === 'MM only').reduce((s,[,d]) => s + d.gmv, 0)) + ' GMV</div></div>';
  cards += '<div class="s-card"><div class="s-label">SMB</div><div class="s-value">' + totalSMB + '</div><div class="s-sub">' + fmt(totalGMV) + ' total GMV</div></div>';
  cards += '<div class="s-card danger"><div class="s-label">Mismatched Accounts</div><div class="s-value">' + totalMismatched + '</div><div class="s-sub">Wrong AM segment assignment</div></div>';
  document.getElementById('summaryCards').innerHTML = cards;
}

loadBrandGroupData();
renderPortfolio();
</script>
